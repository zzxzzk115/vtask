name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          build-cache: true

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: xmake f -m release -p windows -a x64 --vs=2022 --policies=build.ccache:y -y

      - name: Build
        shell: pwsh
        run: xmake repo -u && xmake -vD -y

      - name: Show install error log
        if: failure()
        shell: bash
        run: |
          find /c/Users/runneradmin/.xmake/cache -name install.txt -exec echo "==== {} ====" \; -exec cat {} \;
