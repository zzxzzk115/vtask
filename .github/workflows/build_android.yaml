name: Build Android

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: ".xmake-cache"
          build-cache: true

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install build-essential cmake git clang ninja-build -y

      - name: Install Android NDK
        run: sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "ndk;30.0.14904198"

      - name: Verify Android NDK Path
        run: |
          test -d "${ANDROID_SDK_ROOT}/ndk/30.0.14904198"
          test -d "${ANDROID_SDK_ROOT}/ndk/30.0.14904198/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ls -la "${ANDROID_SDK_ROOT}/ndk/30.0.14904198/toolchains/llvm/prebuilt/linux-x86_64/bin"

      - name: Configure Android Build
        run: xmake f -p android --ndk="${ANDROID_SDK_ROOT}/ndk/30.0.14904198" --policies=build.ccache:y -y

      - name: Show Targets
        run: xmake show -l targets

      - name: Build
        run: xmake repo -u && xmake -vD -y

      - name: Show install error log
        if: failure()
        run: |
          find /home/runner/.xmake/cache -name install.txt -exec echo "==== {} ====" \; -exec cat {} \;
